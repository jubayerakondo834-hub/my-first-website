<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার শপ ড্যাশবোর্ড</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: #16213e;
            padding: 20px;
            border-radius: 10px;
            border-bottom: 3px solid #3498db;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        /* বাটনের স্টাইল */
        .item-btn {
            background-color: #0f3460;
            color: white;
            border: 2px solid #3498db;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            width: 200px;
        }
        .item-btn:hover {
            background-color: #3498db;
            transform: scale(1.05);
        }
        /* দাম দেখানোর বক্স */
        #price-display {
            margin-top: 40px;
            padding: 20px;
            background-color: #e94560;
            display: inline-block;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            min-width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: none; /* শুরুতে লুকানো থাকবে */
        }
    </style>
</head>
<body>

    <header>
        <h1>সবাইকে স্বাগতম!</h1>
        <p>নিচের আইটেমগুলোতে ক্লিক করে প্রতি পিসের দাম দেখুন</p>
    </header>

    <div class="container">
        <button class="item-btn" onclick="showPrice('Text Now', '৳ 100')">Text Now</button>
        <button class="item-btn" onclick="showPrice('Gmail', '৳ 60')">Gmail</button>
        <button class="item-btn" onclick="showPrice('Text Free', '৳ 100')">Text Free</button>
        <button class="item-btn" onclick="showPrice('Facebook Account', 'TK 44')">Facebook Account</button>
    </div>

    <div id="price-display"></div>

    <script>
        function showPrice(name, price) {
            const display = document.getElementById('price-display');
            display.style.display = 'inline-block';
            display.innerHTML = name + "-এর দাম: " + price + " (Per pis)";
        }
    </script>

</body>
