<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার অনলাইন শপ</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
        }
        header {
            background-color: #16213e;
            padding: 20px;
            border-radius: 10px;
            border-bottom: 3px solid #25d366; /* WhatsApp Green */
            margin-bottom: 30px;
        }
        .item-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        .item-btn {
            background-color: #0f3460;
            color: white;
            border: 2px solid #3498db;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            width: 150px;
            transition: 0.3s;
        }
        .item-btn:hover { background-color: #3498db; }

        #price-box {
            margin: 30px auto;
            padding: 20px;
            background-color: #0f3460;
            border-radius: 10px;
            display: none;
            max-width: 400px;
        }
        
        /* WhatsApp Button */
        .ws-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
        }
        .ws-btn:hover { background-color: #1ebea5; }
    </style>
</head>
<body>

    <header>
        <h1>Wellcome To My Site!</h1>
        <p>Click on the account to see the price and place an order.</p>
    </header>

    <div class="item-list">
        <button class="item-btn" onclick="showOrder('Gmail', '৳ 50')">Gmail</button>
        <button class="item-btn" onclick="showOrder('Text Now', '৳ 100')">Text Now</button>
        <button class="item-btn" onclick="showOrder('Facebook Account', '৳ 50')">Facebook Account</button>
    </div>

    <div id="price-box">
        <h2 id="item-name"></h2>
        <p id="item-price" style="font-size: 24px; color: #25d366;"></p>
        <a id="ws-link" href="#" target="_blank" class="ws-btn">Order in Whatsapp</a>
    </div>

    <script>
        function showOrder(name, price) {
            document.getElementById('price-box').style.display = 'block';
            document.getElementById('item-name').innerText = name;
            document.getElementById('item-price').innerText = "Price: " + price;

            
            let myNumber = "+880 01405675867"; 
            let message = "Hello, I want to order an account from you. '" + name + "' ";
            
            // লিঙ্ক তৈরি করা
            let url = "https://wa.me/" + myNumber + "?text=" + encodeURIComponent(message);
            document.getElementById('ws-link').href = url;
        }
    </script>

</body>
</html>
