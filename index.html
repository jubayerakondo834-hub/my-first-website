<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>আমার প্রথম ওয়েবসাইট</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding-top: 100px;
        }
        .container {
            background-color: #34495e;
            padding: 40px;
            display: inline-block;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        h1 { color: #3498db; }
        .btn {
            display: inline-block; 
            margin-top: 20px; 
            padding: 12px 24px; 
            background-color: #1877f2; 
            color: white; 
            text-decoration: none; 
            border-radius: 25px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>স্বাগতম!</h1>
        <p>আমি ওয়েবসাইট ডেভেলপমেন্ট শিখছি।</p>
        <a href="https://facebook.com/yourprofile" target="_blank" class="btn">আমার ফেসবুক প্রোফাইল</a>
    </div>
</body>
</html>
